_schema-version: 3.3.0
ID: com.aleron.monitor
description: Monitor App
version: 1.0.0
modules:
- name: monitor-srv
  type: nodejs
  path: gen/srv
  requires:
  - name: monitor-db
  - name: monitor-auth
  - name: monitor-destination-service
  - name: monitor-application-logs
  provides:
  - name: srv-api
    properties:
      srv-url: ${default-url}
  parameters:
    buildpack: nodejs_buildpack
    readiness-health-check-http-endpoint: /health
    readiness-health-check-type: http
  build-parameters:
    builder: npm
- name: monitor-db-deployer
  type: hdb
  path: gen/db
  requires:
  - name: monitor-db
  parameters:
    buildpack: nodejs_buildpack
- name: monitor-app-content
  type: com.sap.application.content
  path: .
  requires:
  - name: monitor-repo-host
    parameters:
      content-target: true
  build-parameters:
    build-result: resources
    requires:
    - artifacts:
      - monitor.zip
      name: monitor-ui
      target-path: resources/
    - artifacts:
      - configuration.zip
      name: configuration
      target-path: resources/
    - artifacts:
      - trip.zip
      name: trip
      target-path: resources/
    - artifacts:
      - tripmanagement.zip
      name: tripmanagement
      target-path: resources/
    - artifacts:
      - monitorinterfacereporting.zip
      name: monitorinterfacereporting
      target-path: resources/
- name: monitor-destination-content
  type: com.sap.application.content
  requires:
  - name: monitor-destination-service
    parameters:
      content-target: true
  - name: monitor-repo-host
    parameters:
      service-key:
        name: monitor-repo-host-key
  - name: monitor-auth
    parameters:
      service-key:
        name: monitor-auth-key
  parameters:
    content:
      instance:
        destinations:
        - Name: monitor_monitor_html_repo_host
          ServiceInstanceName: monitor-html5-srv
          ServiceKeyName: monitor-repo-host-key
          sap.cloud.service: monitor
        - Authentication: OAuth2UserTokenExchange
          Name: monitor_monitor_auth
          ServiceInstanceName: monitor-xsuaa-srv
          ServiceKeyName: monitor-auth-key
          sap.cloud.service: monitor
        existing_destinations_policy: ignore
  build-parameters:
    no-source: true
- name: monitor-ui
  type: html5
  path: app/monitor
  build-parameters:
    build-result: dist
    builder: custom
    commands:
    - npm install
    - npm run build:cf
    supported-platforms: []
- name: configuration
  type: html5
  path: app/configuration
  build-parameters:
    build-result: dist
    builder: custom
    commands:
    - npm install
    - npm run build:cf
    supported-platforms: []
- name: trip
  type: html5
  path: app/trip
  build-parameters:
    build-result: dist
    builder: custom
    commands:
    - npm install
    - npm run build:cf
    supported-platforms: []
- name: tripmanagement
  type: html5
  path: app/tripmanagement
  build-parameters:
    build-result: dist
    builder: custom
    commands:
    - npm install
    - npm run build:cf
    supported-platforms: []
- name: monitorinterfacereporting
  type: html5
  path: app/monitorinterfacereporting
  build-parameters:
    build-result: dist
    builder: custom
    commands:
    - npm install
    - npm run build:cf
    supported-platforms: []
resources:
- name: monitor-db
  type: com.sap.xs.hdi-container
  parameters:
    service: hana
    service-plan: hdi-shared
- name: monitor-repo-host
  type: org.cloudfoundry.managed-service
  parameters:
    service: html5-apps-repo
    service-name: monitor-html5-srv
    service-plan: app-host
- name: monitor-destination-service
  type: org.cloudfoundry.managed-service
  parameters:
    config:
      HTML5Runtime_enabled: true
      init_data:
        instance:
          destinations:
          - Authentication: NoAuthentication
            Name: ui5
            ProxyType: Internet
            Type: HTTP
            URL: https://ui5.sap.com
          - Authentication: NoAuthentication
            HTML5.DynamicDestination: true
            HTML5.ForwardAuthToken: true
            Name: monitor-srv-api
            ProxyType: Internet
            Type: HTTP
            URL: ~{srv-api/srv-url}
          - Authentication: NoAuthentication
            HTML5.DynamicDestination: true
            HTML5.ForwardAuthToken: true
            Name: com_aleron_monitor-srv-api
            ProxyType: Internet
            Type: HTTP
            URL: ~{srv-api/srv-url}
          - Authentication: NoAuthentication
            HTML5.DynamicDestination: true
            HTML5.ForwardAuthToken: true
            Name: srv-api
            ProxyType: Internet
            Type: HTTP
            URL: ~{srv-api/srv-url}
          existing_destinations_policy: update
      version: 1.0.0
    service: destination
    service-name: monitor-destination-service
    service-plan: lite
  requires:
  - name: srv-api
- name: monitor-auth
  type: org.cloudfoundry.managed-service
  parameters:
    config:
      tenant-mode: dedicated
      xsappname: monitor-xsuaa
    path: ./xs-security.json
    service: xsuaa
    service-name: monitor-xsuaa-srv
    service-plan: application
- name: monitor-application-logs
  type: org.cloudfoundry.managed-service
  parameters:
    service: application-logs
    service-name: monitor-application-logs
    service-plan: lite
parameters:
  deploy_mode: html5-repo
  enable-parallel-deployments: true
build-parameters:
  before-all:
  - builder: custom
    commands:
    - npm ci
    - npx -p @sap/cds-dk cds build --production
